# ~~ Generated by projen. To modify, edit .projenrc.js and run "npx projen".

services:
  database:
    image: postgis/postgis:13-master
    environment:
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
      POSTGRES_DB: directus
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test:
        - CMD
        - pg_isready
        - --host=localhost
        - --username=directus
      interval: 10s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s
  cache:
    image: redis:6
    ports:
      - target: 6379
        published: 6379
        protocol: tcp
        mode: host
    volumes:
      - type: volume
        source: redis_storage
        target: /data
    healthcheck:
      test:
        - CMD-SHELL
        - "[ $(redis-cli ping) = 'PONG' ]"
      interval: 10s
      timeout: 5s
      retries: 5
      start_interval: 5s
      start_period: 30s
  directus:
    build:
      context: .
    command:
      - sh
      - -c
      - npx directus start
    environment:
      KEY: some-random-key
      SECRET: another-random-key
      CONFIG_PATH: .env.local
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: "5432"
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus
      CACHE_ENABLED: "false"
      CACHE_REDIS_HOST: cache
      CACHE_STATUS_HEADER: cache-hit
      CORS_ENABLED: "true"
      CORS_ORIGIN: "true"
      LOG_LEVEL: info
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: totototo
      EXTENSIONS_AUTO_RELOAD: "true"
      VALIDATE_ENTITIES_TOKENS_API_KEY: toto
      AWS_KMS_KEY_ID: tutu
    ports:
      - target: 8055
        published: 8055
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        source: ./uploads
        target: /app/uploads
      - type: bind
        source: ./extensions
        target: /app/extensions
      - type: bind
        source: ./.env.local
        target: /app/.env.local
    depends_on:
      cache:
        condition: service_healthy
      database:
        condition: service_healthy
volumes:
  pgdata: {}
  redis_storage: {}
