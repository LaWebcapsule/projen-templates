name: sast-analysis
on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max_old_space_size=6144
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install semgrep
        run: python3 -m pip install semgrep
      - name: Run Semgrep
        run: semgrep scan
