name: Report a bug
description: Create a report to help us improve
body:
 - type: markdown
   attributes:
    value: |
     Hi, thank you for taking the time to create an issue! Before you get started, please ensure the following are correct:

     - I'm using the latest version of my-test-project
     - There's no other issue that already describes the problem.

 - type: textarea
   attributes:
    label: Describe the Bug
    description: A clear and concise description of what the bug is.
   validations:
    required: true
 - type: textarea
   attributes:
    label: To Reproduce
    description:
     Steps to reproduce the behavior. Contributors should be able to follow the steps provided in order to reproduce
     the bug.
   validations:
    required: true
 - type: input
   attributes:
    label: Version
    placeholder: v0.x.x
   validations:
    required: true
 - type: dropdown
   id: deployment
   attributes:
    label: Hosting Strategy
    options:
     - Self-Hosted (Docker Image)
     - Self-Hosted (Custom)
   validations:
    required: true